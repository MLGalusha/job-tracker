<svg viewBox="0 0 1200 820" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc" style="max-width: 100%; height: auto;">
  <title id="title">Per-role application dossier</title>
  <desc id="desc">Diagram showing how one application folder contains the role analysis, company research, resume, cover letter, and study guide.</desc>
  <rect width="1200" height="820" rx="28" fill="#0B1220"/>
  <rect x="24" y="24" width="1152" height="772" rx="24" fill="#111827" stroke="#1F2937" stroke-width="2"/>

  <text x="56" y="92" fill="#F9FAFB" font-size="40" font-family="Inter, Arial, sans-serif" font-weight="700">Per-Role Application Dossier</text>
  <text x="56" y="126" fill="#93A3B8" font-size="20" font-family="Inter, Arial, sans-serif">Each target company gets its own folder with research, tailored docs, and prep material.</text>

  <rect x="72" y="176" width="286" height="590" rx="22" fill="#0F172A" stroke="#334155" stroke-width="2"/>
  <text x="102" y="218" fill="#E2E8F0" font-size="20" font-family="Inter, Arial, sans-serif" font-weight="700">applications/</text>
  <text x="102" y="246" fill="#E2E8F0" font-size="20" font-family="Inter, Arial, sans-serif" font-weight="700">&lt;role-slug&gt;/</text>

  <rect x="102" y="281" width="226" height="56" rx="12" fill="#172554"/>
  <text x="124" y="317" fill="#DBEAFE" font-size="22" font-family="Inter, Arial, sans-serif">role.md</text>

  <rect x="102" y="377" width="226" height="56" rx="12" fill="#1E3A8A"/>
  <text x="124" y="413" fill="#DBEAFE" font-size="22" font-family="Inter, Arial, sans-serif">company.md</text>

  <rect x="102" y="473" width="226" height="56" rx="12" fill="#0F766E"/>
  <text x="124" y="509" fill="#CCFBF1" font-size="22" font-family="Inter, Arial, sans-serif">resume.md</text>

  <rect x="102" y="569" width="226" height="56" rx="12" fill="#7C2D12"/>
  <text x="124" y="605" fill="#FED7AA" font-size="22" font-family="Inter, Arial, sans-serif">cover-letter.md</text>

  <rect x="102" y="665" width="226" height="56" rx="12" fill="#4C1D95"/>
  <text x="124" y="701" fill="#E9D5FF" font-size="22" font-family="Inter, Arial, sans-serif">study-guide.md</text>

  <rect x="402" y="176" width="700" height="590" rx="22" fill="#0F172A" stroke="#334155" stroke-width="2"/>
  <text x="434" y="228" fill="#F9FAFB" font-size="28" font-family="Inter, Arial, sans-serif" font-weight="700">What each file contributes</text>

  <rect x="434" y="255" width="636" height="82" rx="16" fill="#172554"/>
  <text x="460" y="303" fill="#DBEAFE" font-size="20" font-family="Inter, Arial, sans-serif" font-weight="700">role.md</text>
  <text x="620" y="285" fill="#BFDBFE" font-size="15" font-family="Inter, Arial, sans-serif">
    <tspan x="620" dy="0">Fit score, day-to-day work,</tspan>
    <tspan x="620" dy="20">requirement-by-requirement gaps,</tspan>
    <tspan x="620" dy="20">and application strategy</tspan>
  </text>

  <rect x="434" y="351" width="636" height="82" rx="16" fill="#1E3A8A"/>
  <text x="460" y="399" fill="#DBEAFE" font-size="20" font-family="Inter, Arial, sans-serif" font-weight="700">company.md</text>
  <text x="620" y="381" fill="#BFDBFE" font-size="15" font-family="Inter, Arial, sans-serif">
    <tspan x="620" dy="0">Decisions, frictions, business context,</tspan>
    <tspan x="620" dy="20">risks, interview angles,</tspan>
    <tspan x="620" dy="20">and artifact opportunities</tspan>
  </text>

  <rect x="434" y="447" width="636" height="82" rx="16" fill="#0F766E"/>
  <text x="460" y="495" fill="#CCFBF1" font-size="20" font-family="Inter, Arial, sans-serif" font-weight="700">resume.md</text>
  <text x="620" y="487" fill="#99F6E4" font-size="15" font-family="Inter, Arial, sans-serif">
    <tspan x="620" dy="0">Tailored bullet selection and framing</tspan>
    <tspan x="620" dy="20">based on real project evidence</tspan>
  </text>

  <rect x="434" y="543" width="636" height="82" rx="16" fill="#7C2D12"/>
  <text x="460" y="591" fill="#FED7AA" font-size="20" font-family="Inter, Arial, sans-serif" font-weight="700">cover-letter.md</text>
  <text x="620" y="573" fill="#FDBA74" font-size="15" font-family="Inter, Arial, sans-serif">
    <tspan x="620" dy="0">Company-specific pitch grounded</tspan>
    <tspan x="620" dy="20">in actual overlap instead of</tspan>
    <tspan x="620" dy="20">generic enthusiasm</tspan>
  </text>

  <rect x="434" y="639" width="636" height="82" rx="16" fill="#4C1D95"/>
  <text x="460" y="687" fill="#E9D5FF" font-size="20" font-family="Inter, Arial, sans-serif" font-weight="700">study-guide.md</text>
  <text x="620" y="669" fill="#DDD6FE" font-size="15" font-family="Inter, Arial, sans-serif">
    <tspan x="620" dy="0">Gap-closing prep plan, likely</tspan>
    <tspan x="620" dy="20">interview questions, and</tspan>
    <tspan x="620" dy="20">company-specific study priorities</tspan>
  </text>

  <path d="M328 309H434" stroke="#64748B" stroke-width="4" stroke-linecap="round"/>
  <path d="M328 405H434" stroke="#64748B" stroke-width="4" stroke-linecap="round"/>
  <path d="M328 501H434" stroke="#64748B" stroke-width="4" stroke-linecap="round"/>
  <path d="M328 597H434" stroke="#64748B" stroke-width="4" stroke-linecap="round"/>
  <path d="M328 693H434" stroke="#64748B" stroke-width="4" stroke-linecap="round"/>

  <text x="72" y="806" fill="#93A3B8" font-size="18" font-family="Inter, Arial, sans-serif">The point is not “one resume for every job.” The point is one folder per opportunity with the reasoning preserved.</text>
</svg>
