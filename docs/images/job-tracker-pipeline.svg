<svg viewBox="0 0 1280 760" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc" style="max-width: 100%; height: auto;">
  <title id="title">Job Tracker Pipeline</title>
  <desc id="desc">Diagram showing the main flow of the job tracker: profile, sourcing, research, tailored artifacts, and status tracking.</desc>
  <rect width="1280" height="760" rx="28" fill="#0B1220"/>
  <rect x="24" y="24" width="1232" height="712" rx="24" fill="#111827" stroke="#1F2937" stroke-width="2"/>

  <text x="56" y="92" fill="#F9FAFB" font-size="40" font-family="Inter, Arial, sans-serif" font-weight="700">Job Search Pipeline</text>
  <text x="56" y="126" fill="#93A3B8" font-size="20" font-family="Inter, Arial, sans-serif">One source of truth in, per-role application dossiers out.</text>

  <rect x="56" y="178" width="276" height="164" rx="18" fill="#172554" stroke="#3B82F6" stroke-width="2"/>
  <text x="80" y="222" fill="#BFDBFE" font-size="18" font-family="Inter, Arial, sans-serif" font-weight="700">1. Profile Layer</text>
  <text x="80" y="258" fill="#E5E7EB" font-size="22" font-family="Inter, Arial, sans-serif" font-weight="700">profile/</text>
  <text x="80" y="288" fill="#CBD5E1" font-size="17" font-family="Inter, Arial, sans-serif">
    <tspan x="80" dy="0">Skills, projects, story,</tspan>
    <tspan x="80" dy="24">voice, comp prefs,</tspan>
    <tspan x="80" dy="24">targets</tspan>
  </text>

  <rect x="356" y="178" width="276" height="164" rx="18" fill="#1F2937" stroke="#10B981" stroke-width="2"/>
  <text x="380" y="222" fill="#A7F3D0" font-size="18" font-family="Inter, Arial, sans-serif" font-weight="700">2. Data Layer</text>
  <text x="380" y="258" fill="#F3F4F6" font-size="22" font-family="Inter, Arial, sans-serif" font-weight="700">data/</text>
  <text x="380" y="288" fill="#D1D5DB" font-size="17" font-family="Inter, Arial, sans-serif">
    <tspan x="380" dy="0">events.jsonl,</tspan>
    <tspan x="380" dy="24">sourced jobs,</tspan>
    <tspan x="380" dy="24">derived status views</tspan>
  </text>

  <rect x="656" y="178" width="276" height="164" rx="18" fill="#3F1D2E" stroke="#F472B6" stroke-width="2"/>
  <text x="680" y="222" fill="#F9A8D4" font-size="18" font-family="Inter, Arial, sans-serif" font-weight="700">3. Skill Layer</text>
  <text x="680" y="258" fill="#FCE7F3" font-size="22" font-family="Inter, Arial, sans-serif" font-weight="700">.agents/skills/</text>
  <text x="680" y="288" fill="#FBCFE8" font-size="17" font-family="Inter, Arial, sans-serif">
    <tspan x="680" dy="0">Sourcer, intake,</tspan>
    <tspan x="680" dy="24">research, tailoring,</tspan>
    <tspan x="680" dy="24">outreach, prep</tspan>
  </text>

  <rect x="956" y="178" width="268" height="164" rx="18" fill="#3A2406" stroke="#F59E0B" stroke-width="2"/>
  <text x="980" y="222" fill="#FDE68A" font-size="18" font-family="Inter, Arial, sans-serif" font-weight="700">4. Output Layer</text>
  <text x="980" y="258" fill="#FEF3C7" font-size="20" font-family="Inter, Arial, sans-serif" font-weight="700">applications/&lt;role&gt;/</text>
  <text x="980" y="286" fill="#FDE68A" font-size="17" font-family="Inter, Arial, sans-serif">
    <tspan x="980" dy="0">role.md, company.md,</tspan>
    <tspan x="980" dy="24">resume, cover letter,</tspan>
    <tspan x="980" dy="24">guides</tspan>
  </text>

  <path d="M332 253H356" stroke="#64748B" stroke-width="4" stroke-linecap="round"/>
  <path d="M632 253H656" stroke="#64748B" stroke-width="4" stroke-linecap="round"/>
  <path d="M932 253H956" stroke="#64748B" stroke-width="4" stroke-linecap="round"/>
  <path d="M346 253L336 245V261L346 253Z" fill="#64748B"/>
  <path d="M646 253L636 245V261L646 253Z" fill="#64748B"/>
  <path d="M946 253L936 245V261L946 253Z" fill="#64748B"/>

  <rect x="56" y="390" width="1168" height="238" rx="22" fill="#0F172A" stroke="#1E293B" stroke-width="2"/>
  <text x="88" y="438" fill="#F9FAFB" font-size="26" font-family="Inter, Arial, sans-serif" font-weight="700">What happens in practice</text>

  <rect x="88" y="470" width="190" height="112" rx="16" fill="#172554"/>
  <text x="110" y="512" fill="#DBEAFE" font-size="20" font-family="Inter, Arial, sans-serif" font-weight="700">Source jobs</text>
  <text x="110" y="544" fill="#BFDBFE" font-size="16" font-family="Inter, Arial, sans-serif">Target company scans</text>
  <text x="110" y="568" fill="#BFDBFE" font-size="16" font-family="Inter, Arial, sans-serif">Deduped into JSONL</text>

  <rect x="312" y="470" width="190" height="112" rx="16" fill="#1F2937"/>
  <text x="334" y="512" fill="#ECFDF5" font-size="20" font-family="Inter, Arial, sans-serif" font-weight="700">Intake roles</text>
  <text x="334" y="544" fill="#D1FAE5" font-size="16" font-family="Inter, Arial, sans-serif">Assess fit and risks</text>
  <text x="334" y="568" fill="#D1FAE5" font-size="16" font-family="Inter, Arial, sans-serif">Write role.md</text>

  <rect x="536" y="470" width="190" height="112" rx="16" fill="#3F1D2E"/>
  <text x="558" y="512" fill="#FCE7F3" font-size="20" font-family="Inter, Arial, sans-serif" font-weight="700">Research</text>
  <text x="558" y="544" fill="#FBCFE8" font-size="15" font-family="Inter, Arial, sans-serif">Ground company</text>
  <text x="558" y="566" fill="#FBCFE8" font-size="15" font-family="Inter, Arial, sans-serif">context</text>

  <rect x="760" y="470" width="190" height="112" rx="16" fill="#3A2406"/>
  <text x="782" y="512" fill="#FEF3C7" font-size="20" font-family="Inter, Arial, sans-serif" font-weight="700">Tailor docs</text>
  <text x="782" y="544" fill="#FDE68A" font-size="15" font-family="Inter, Arial, sans-serif">Resume + cover letter</text>
  <text x="782" y="566" fill="#FDE68A" font-size="15" font-family="Inter, Arial, sans-serif">Truthful by construction</text>

  <rect x="984" y="470" width="190" height="112" rx="16" fill="#1E293B"/>
  <text x="1006" y="512" fill="#E2E8F0" font-size="20" font-family="Inter, Arial, sans-serif" font-weight="700">Track</text>
  <text x="1006" y="544" fill="#CBD5E1" font-size="15" font-family="Inter, Arial, sans-serif">Log events and</text>
  <text x="1006" y="566" fill="#CBD5E1" font-size="15" font-family="Inter, Arial, sans-serif">rebuild status views</text>

  <path d="M278 526H312" stroke="#64748B" stroke-width="4" stroke-linecap="round"/>
  <path d="M502 526H536" stroke="#64748B" stroke-width="4" stroke-linecap="round"/>
  <path d="M726 526H760" stroke="#64748B" stroke-width="4" stroke-linecap="round"/>
  <path d="M950 526H984" stroke="#64748B" stroke-width="4" stroke-linecap="round"/>

  <circle cx="295" cy="526" r="5" fill="#64748B"/>
  <circle cx="519" cy="526" r="5" fill="#64748B"/>
  <circle cx="743" cy="526" r="5" fill="#64748B"/>
  <circle cx="967" cy="526" r="5" fill="#64748B"/>
</svg>
